name: Flutter Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Create fresh Flutter project
        run: flutter create -t app gads_build_app --org com.gads

      - name: Copy GADS app files
        run: |
          cp pubspec.yaml gads_build_app/pubspec.yaml
          rm -rf gads_build_app/lib
          cp -r lib gads_build_app/lib
          cp -r assets gads_build_app/assets

      - name: Get dependencies
        working-directory: gads_build_app
        run: flutter pub get

      - name: Build APK
        working-directory: gads_build_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gads-site-manager-apk
          path: gads_build_app/build/app/outputs/flutter-apk/app-release.apk
